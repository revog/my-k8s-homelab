---
controllers:
  app:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: v1.
        env:
          PUID: 1000
          GUID: 1000
          HOMEPAGE_ALLOWED_HOSTS: start.internal.${CLUSTER_DOMAIN},start.private.${CLUSTER_DOMAIN}
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 10
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 1Gi

persistence:
  base-config:
    enabled: "true"
    type: "custom"
    volumeSpec:
      emptyDir: {}
    mountPath: /app/config
  config:
    enabled: "true"
    type: "custom"
    volumeSpec:
      configMap:
        name: homepage-config
    subPath:
      - path: bookmarks.yaml
        mountPath: /app/config/bookmarks.yaml
      # - path: docker.yaml
      #   mountPath: /app/config/docker.yaml
      - path: kubernetes.yaml
        mountPath: /app/config/kubernetes.yaml
      - path: services.yaml
        mountPath: /app/config/services.yaml
      - path: settings.yaml
        mountPath: /app/config/settings.yaml
      - path: widgets.yaml
        mountPath: /app/config/widgets.yaml
  logs:
    enabled: true
    type: emptyDir
    mountPath: /app/config/logs
        
route:
  app:
    hostnames:
      - start.internal.${CLUSTER_DOMAIN}
      - start.private.${CLUSTER_DOMAIN}
    parentRefs:
      - name: internal
        namespace: infra-gateway
      - name: private
        namespace: infra-tailscale
    rules:
      - backendRefs:
          - identifier: app
            port: 3000

service:
  app:
    ports:
      http:
        port: 3000
