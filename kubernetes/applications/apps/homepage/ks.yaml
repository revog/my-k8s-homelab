---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app homepage
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/apps/homepage/app
  targetNamespace: app-homepage
  postBuild:
    substitute:
      APP: *app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: homelab
