# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/apps/immich/app
  targetNamespace: app-immich
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: volsync
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CLAIM: immich-library
      VOLSYNC_CAPACITY: 250Gi
      VOLSYNC_SCHEDULE: "30 2 * * *" # 2:30am
      # VOLSYNC_S3_SCHEDULE: "0 1 * * *" # 1:00am
      VOLSYNC_UID: "1004"
      VOLSYNC_GID: "1004"

---
