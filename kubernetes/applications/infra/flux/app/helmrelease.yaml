# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux
  namespace: infra-flux
spec:
  interval: 30m
  chart:
    spec:
      chart: flux2
      version: "^2.13.0"
      sourceRef:
        kind: HelmRepository
        name: fluxcd-community
        namespace: infra-flux
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values: {}
