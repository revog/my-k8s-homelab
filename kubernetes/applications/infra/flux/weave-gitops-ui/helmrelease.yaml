# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: infra-flux
spec:
  interval: 1h
  chart:
    spec:
      chart: weave-gitops
      version: 0.38.0
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
  valuesFrom:
    - kind: ConfigMap
      name: gitops-values
      valuesKey: values.yaml
