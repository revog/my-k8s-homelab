# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux
  namespace: infra-flux
spec:
  interval: 15m
  path: "./kubernetes/applications/infra/flux/app"
  prune: true
  wait: true
  targetNamespace: infra-flux
  sourceRef:
    kind: GitRepository
    name: homelab
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
      - kind: Secret
        name: cluster-secret

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-mutating-webhook
  namespace: infra-flux
spec:
  interval: 15m
  path: "./kubernetes/applications/infra/flux/kustomize-mutating-webhook"
  prune: true
  wait: true
  targetNamespace: infra-flux
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: flux

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: weave-gitops-ui
  namespace: infra-flux
spec:
  interval: 15m
  path: "./kubernetes/applications/infra/flux/weave-gitops-ui"
  prune: true
  wait: true
  targetNamespace: infra-flux
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: flux
  decryption:
    provider: sops
    secretRef:
      name: sops-age
