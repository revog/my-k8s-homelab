---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    grafana.internal/instance: grafana
    dashboards: grafana
spec:
  client:
    preferIngress: false
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    auth:
      disable_login_form: "true"
    auth.generic_oauth:
      auto_login: "true"
      # For variables see https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#env-provider
      enabled: "true"
      name: "Pocket ID"
      allow_sign_up: "true"
      client_id: "${GRAFANA_AUTH_GENERIC_CLIENT_ID}"
      client_secret: "${GRAFANA_AUTH_GENERIC_CLIENT_SECRET}"
      scopes: "openid email profile groups"
      email_attribute_path: email
      login_attribute_path: username
      name_attribute_path: fullname
      groups_attribute_path: groups
      auth_url: "https://auth.${CLUSTER_DOMAIN}/authorize"
      token_url: "https://auth.${CLUSTER_DOMAIN}/api/oidc/token"
      #role_attribute_path: "contains(groups[*], 'raspbernetes:k8s-admins') && 'Admin' || contains(groups[*], 'people') && 'Viewer'"
      role_attribute_path: "contains(groups, 'infra-admins') && 'Admin' || 'Viewer'"
      use_pkce: "true"
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
    security:
      angular_support_enabled: "true"
    server:
      enable_gzip: "true"
      root_url: https://grafana.internal.${CLUSTER_DOMAIN}
    smtp:
      enabled: "false"
      # host: "smtp-relay.home-system.svc.cluster.local:25"
      # from_address: "noreply@${CLUSTER_DOMAIN}"
      # from_name: "Grafana"
      # skip_verify: "true"
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_PASSWORD
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: longhorn-v2
  disableDefaultSecurityContext: All
