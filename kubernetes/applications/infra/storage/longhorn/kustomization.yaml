# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrelease.yaml
  - helmrepository.yaml
  - httproute.yaml
  - namespace.yaml
  - storageclass.yaml
  - volumesnapshotclass.yaml

configMapGenerator:
  - name: longhorn-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
