---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-v2
  annotations:
    storageclass.kubernetes.io/is-default-class: "true" # set as cluster default

allowVolumeExpansion: true
parameters:
  dataEngine: "v2" # use longhorn v2 (SPDK)
  dataLocality: "disabled"
  fsType: "ext4"
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
provisioner: driver.longhorn.io
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-static
allowVolumeExpansion: true
parameters:
  staleReplicaTimeout: "30"
provisioner: driver.longhorn.io
reclaimPolicy: Delete
volumeBindingMode: Immediate
