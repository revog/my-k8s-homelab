# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/gateway-api/crds
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/gateway-api/app
  targetNamespace: infra-gateway
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  dependsOn:
    - name: gateway-api-crds
  sourceRef:
    kind: GitRepository
    name: homelab
