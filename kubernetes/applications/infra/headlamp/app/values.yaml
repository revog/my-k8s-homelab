clusterRoleBinding:
  create: false

config:
  inClusterContextName: "homelab"
  pluginsDir: /build/plugins
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-oidc-secret

pluginsManager:
  enabled: true
  configContent: |
    plugins:
      - name: cert-manager
        source: https://github.com/headlamp-k8s/plugins/releases/download/cert-manager-0.1.1/headlamp-k8s-cert-manager-0.1.1.tar.gz
        version: 0.1.1
      - name: flux
        source: https://github.com/headlamp-k8s/plugins/releases/download/flux-0.6.0/headlamp-k8s-flux-0.6.0.tar.gz
        version: 0.6.0
      - name: prometheus
        source: https://github.com/headlamp-k8s/plugins/releases/download/prometheus-0.9.0/prometheus-0.9.0.tar.gz
        version: 0.9.0

serviceAccount:
  create: false

settings:
  configuration:
    plugins:
      "@kinvolk/kubernetes-prometheus":
        homelab:
          prometheusEndpoint: "infra-monitoring/vmsingle-vm:8428"
          prometheusSubpath: ""
