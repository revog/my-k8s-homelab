clusterRoleBinding:
  create: false

config:
  args:
    - "-cluster-name=homelab"
  pluginsDir: /build/plugins
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-oidc-secret

pluginsManager:
  enabled: true
  configContent: |
    plugins:
      - name: flux
        source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
        version: latest
      - name: cert-manager
        source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
        version: latest

serviceAccount:
  create: false

settings:
  configuration:
    plugins:
      "@kinvolk/kubernetes-prometheus":
        homelab:
          prometheusEndpoint: "infra-monitoring/vmsingle-vm:8428"
          prometheusSubpath: ""
