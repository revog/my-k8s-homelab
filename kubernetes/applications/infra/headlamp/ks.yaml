---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: infra-flux
spec:
  interval: 15m
  path: "./kubernetes/applications/infra/app/headlamp"
  prune: true
  wait: true
  targetNamespace: infra-headlamp
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: flux
      namespace: infra-flux
  decryption:
    provider: sops
    secretRef:
      name: sops-age
