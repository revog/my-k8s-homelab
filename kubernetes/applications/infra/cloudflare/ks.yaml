apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-tunnel
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/cloudflare-tunnel/app
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  dependsOn:
    - name: cilium
  targetNamespace: infra-cloudflare
