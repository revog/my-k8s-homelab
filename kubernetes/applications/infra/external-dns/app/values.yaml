---
cloudflare:
  proxied: false # Default use "Grey cloud" (DNS only) for LAN and Tailscale.

domainFilters:
  - "${CLUSTER_DOMAIN}"

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        key: CLOUDFLARE_API_TOKEN
        name: external-dns-cloudflare

extraArgs:
  #- --cloudflare-proxied  # Enables per-route overriding to "Orange Cloud" (for public tier)
  - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
  - --crd-source-kind=DNSEndpoint
  #- --annotation-filter=external-dns.alpha.kubernetes.io/external=true # Only processes resources with this annotation

policy: sync # Delete DNS entries on cloudflare, if app is removed

priorityClassName: system-cluster-critical

provider:
  name: cloudflare

registry: txt
txtPrefix: k8s.
txtOwnerId: "k8s-homelab-cluster"

sources:
  - crd
  - gateway-httproute
  # - ingress
  # - service

serviceMonitor:
  enabled: true

triggerLoopOnEvent: true
