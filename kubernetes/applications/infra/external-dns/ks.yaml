---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: infra-external-dns
spec:
  dependsOn:
    - name: globals
  path: "./kubernetes/applications/infra/external-dns/app"
  wait: true
  interval: 15m
  prune: false
  targetNamespace: infra-external-dns
  sourceRef:
    kind: GitRepository
    name: homelab
