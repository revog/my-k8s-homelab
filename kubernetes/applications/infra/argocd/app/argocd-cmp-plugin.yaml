apiVersion: v1
kind: ConfigMap
metadata:
  name: vars-substitutor-plugin
  namespace: infra-argocd
data:
  configManagementPlugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: vars-substitutor
    spec:
      version: v1.0
      generate:
        command: ["sh", "-c"]
        args:
          - |
            # Template Helm chart (if existing) or use plany YAML
            if [ -f "Chart.yaml" ]; then
              helm template . > combined.yaml
            else
              cat *.yaml > combined.yaml
            fi
            # Replace vars with effective values
            envsubst < combined.yaml
      discover:
        fileName: "argocd-plugin.yaml"
