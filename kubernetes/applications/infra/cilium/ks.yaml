---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: infra-flux
spec:
  path: "./applications/infra/cilium/app"
  wait: false
  interval: 15m
  prune: false
  dependsOn:
    - name: cilium-crds
      namespace: infra-flux
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: homelab

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-crds
  namespace: infra-flux
spec:
  path: "/applications/infra/cilium/crds"
  wait: false
  interval: 15m
  prune: false
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: homelab
