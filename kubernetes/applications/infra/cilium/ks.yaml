---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: infra-flux
spec:
  path: "./kubernetes/applications/infra/cilium/app"
  wait: true
  interval: 15m
  prune: false
  dependsOn:
    - name: cilium-crds
      namespace: infra-flux
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: homelab
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
      - kind: Secret
        name: cluster-secret

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-crds
  namespace: infra-flux
spec:
  path: "./kubernetes/applications/infra/cilium/crds"
  wait: true
  interval: 15m
  prune: false
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: homelab
