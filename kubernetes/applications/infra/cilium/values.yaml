# TO BE CONFIGURED - sample values
kubeProxyReplacement: true

ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.244.0.0/16

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN

operator:
  replicas: 1
