---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

resources:
#  - grafanadashboard.yaml TEMP DISABLED
  - certificate.yaml
  - helmrelease.yaml
  - httproute.yaml
  - loadbalancer.yaml
  - ocirepository.yaml

configMapGenerator:
  - name: cilium-values
    files:
      - values.yaml=./values.yaml

generatorOptions:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled

configurations:
  - kustomizeconfig.yaml

patches:
  - patch: |
      - op: replace
        path: /metadata/namespace
        value: infra-tailscale
    target:
      kind: Certificate
      name: hubble-cert
