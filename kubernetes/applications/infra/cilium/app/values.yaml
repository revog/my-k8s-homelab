bpf:
  hostLegacyRouting: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

gatewayAPI:
  enabled: true

hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http
      - port-distribution
      - policy-verdict:sourceContext=pod;destinationContext=pod;labelsContext=source_namespace,destination_namespace
  relay:
    enabled: true
  ui:
    enabled: true

ipam:
  mode: kubernetes

kubeProxyReplacement: true

k8sServiceHost: 127.0.0.1
k8sServicePort: 7445

l2announcements:
  enabled: true

operator:
  replicas: 2
  priorityClassName: system-cluster-critical
  PodDisruptionBudget:
    enabled: true
    minAvailable: 1
    unhealthyPodEvictionPolicy: AlwaysAllow

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

priorityClassName: system-node-critical

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

socketLB:
  hostNamespaceOnly: true
