# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/cert-manager/app
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  dependsOn:
    - name: cert-manager-crds
      namespace: infra-flux
    - name: prometheus-crds
      namespace: infra-flux
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: infra-certmanager
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: letsencrypt-homelab
  healthCheckExprs:
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  sourceRef:
    kind: GitRepository
    name: homelab
  targetNamespace: infra-certmanager

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-crds
  namespace: infra-flux
spec:
  path: "./kubernetes/applications/infra/cert-manager/crds"
  wait: true
  interval: 15m
  prune: false
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: homelab
