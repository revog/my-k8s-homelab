# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-crds
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/cert-manager/crds
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/cert-manager/app
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  dependsOn:
    - name: cert-manager-crds
  sourceRef:
    kind: GitRepository
    name: homelab
  targetNamespace: infra-cert-manager
