# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ocirepository.yaml
  - helmrelease.yaml
#  - clusterissuer.yaml
  - cloudflare-secret.age.enc.yaml
  - certificate.yaml
  - namespace.yaml

configMapGenerator:
  - name: cert-manager-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
