# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrelease.yaml
  - namespace.yaml
  - helmrepository.yaml

configMapGenerator:
  - name: nfd-values
    files:
      - values.yaml=./values.yaml
    options:
      disableNameSuffixHash: true
