# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gateway.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - namespace.yaml
  - secrets.enc.age.yaml

configMapGenerator:
  - name: tailscale-operator-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      version: v1
      kind: Service
      name: cilium-gateway-private
      namespace: infra-tailscale
    patch: |
      - op: add
        path: /metadata/annotations/tailscale.com~1expose
        value: "true"
      - op: add
        path: /metadata/annotations/tailscale.com~1hostname
        value: "homelab-private-gateway"
