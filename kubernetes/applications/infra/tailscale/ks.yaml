# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/tailscale/app
  targetNamespace: infra-tailscale
  interval: 15m
  retryInterval: 1m
  timeout: 3m
  prune: true
  wait: true
  dependsOn:
    - name: cilium
  sourceRef:
    kind: GitRepository
    name: homelab
