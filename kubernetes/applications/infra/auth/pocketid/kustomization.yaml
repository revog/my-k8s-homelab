---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrelease.yaml
  - helmrepository.yaml
  - httproute.yaml
  - namespace.yaml
  - secret.age.enc.yaml

components:
  - ../../../components/volsync

configMapGenerator:
  - name: pocketid-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
