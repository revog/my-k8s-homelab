---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocketid
spec:
  interval: 30m
  chart:
    spec:
      chart: pocket-id
      version: "2.2.0"
      sourceRef:
        kind: HelmRepository
        name: anza-labs
        namespace: infra-auth
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: pocketid-values
      valuesKey: values.yaml
