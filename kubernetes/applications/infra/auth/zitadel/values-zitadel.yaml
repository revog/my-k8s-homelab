---
zitadel:
  masterkeySecretName: zitadel-masterkey
  configmapConfig:
    Database.Postgres.Host: "postgres-postgresql.infra-auth.svc.cluster.local"
    Database.Postgres.Port: 5432
    Database.Postgres.Database: "zitadel"
    ExternalDomain: auth.${CLUSTER_DOMAIN}
    ExternalSecure: true
    ExternalPort: 443
    FirstInstance:
      Org:
        Human:
          UserName: "admin"                     # ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
          Email: "reto@vogel.vu"                # ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL
          Password: "TheSecureInitPassword123!" # ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
          PasswordChangeRequired: true
  configSecretName: zitadel-config
  configSecretKey: config.yaml

gateway:
  # HTTPRoute configuration for ZITADEL HTTP API traffic
  httpRoute:
    enabled: true
    hostnames:
      - auth.${CLUSTER_DOMAIN}
      - auth.internal.${CLUSTER_DOMAIN}
      - auth.private.${CLUSTER_DOMAIN}
    parentRefs:
      - name: internal
        namespace: infra-gateway
      - name: public
        namespace: infra-gateway
      - name: private
        namespace: infra-tailscale
    paths:
      - path: /
        pathType: PathPrefix
login:
  gateway:
    # HTTPRoute configuration for the Login UI
    httpRoute:
      enabled: true
      hostnames:
        - auth.${CLUSTER_DOMAIN}
        - auth.internal.${CLUSTER_DOMAIN}
        - auth.private.${CLUSTER_DOMAIN}
      parentRefs:
        - name: internal
          namespace: infra-gateway
        - name: public
          namespace: infra-gateway
        - name: private
          namespace: infra-tailscale
      paths:
        - path: /ui/v2/login
          pathType: PathPrefix
      # fix for cloudflare
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: "X-Forwarded-Proto"
                value: "https"
  pdb:
    enabled: true
    minAvailable: 1
  # metrics:
  #   enabled: false
  #   serviceMonitor:
  #     enabled: false

# metrics:
#   enabled: false
#   serviceMonitor:
#     enabled: false

postgresql:
  enabled: false

replicaCount: 2
