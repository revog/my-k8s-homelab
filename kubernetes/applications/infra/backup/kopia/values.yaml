---
controllers:
  kopia:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.23.1@sha256:27da0a33b44e1b902150a6c963514237217464bb13118a95bb056667be93cda5
        env:
          KOPIA_WEB_ENABLED: true
          KOPIA_WEB_PORT: &port 51515
          TZ: ${CLUSTER_TIMEZONE}
        envFrom:
          - secretRef:
              name: kopia-secret
        command:
          - /bin/sh
          - -c
          - |
            export HOME=/tmp
            export USER=kopia

            # Copy template config from read-only configMap to writable /config dir if missing
            if [ ! -f /config/repository.config ] && [ -f /configmap/repository.config ]; then
              cp /configmap/repository.config /config/repository.config
            fi

            # Attempt to connect to the existing repository using the secret password
            if ! kopia repository connect filesystem --path=/repository --password="$KOPIA_PASSWORD" 2>/dev/null; then
              echo "Existing repository not found. Initializing a fresh one..."

              # Automatically handle race-conditioned Kopia fragments before creation
              rm -rf /repository/* /repository/.[!.]*
              kopia repository create filesystem --path=/repository --password="$KOPIA_PASSWORD"
            fi

            # Start the Kopia server exposed to the cluster network
            exec kopia server start \
              --address="0.0.0.0:51515" \
              --without-password \
              --insecure \
              --disable-csrf-token-checks \
              --allow-extremely-dangerous-unauthenticated-server-on-the-network
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 1Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1003
    runAsGroup: 1003
    fsGroup: 1003
    fsGroupChangePolicy: OnRootMismatch

service:
  app:
    controller: kopia
    ports:
      http:
        port: *port

route:
  app:
    hostnames:
      - kopia.internal.${CLUSTER_DOMAIN}
      - kopia.private.${CLUSTER_DOMAIN}
    parentRefs:
      - name: internal
        namespace: infra-gateway
      - name: private
        namespace: infra-tailscale
    rules:
      - backendRefs:
          - identifier: app
            port: 51515

configMaps:
  config:
    data:
      repository.config: |-
        {
          "storage": {
            "type": "filesystem",
            "config": {
              "path": "/repository"
            }
          },
          "hostname": "volsync.infra-backup.svc.cluster.local",
          "username": "volsync",
          "description": "volsync",
          "enableActions": false
        }

persistence:
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/repository.config
        subPath: repository.config
  config-dir:
    type: emptyDir
    globalMounts:
      - path: /config
  repository:
    type: nfs
    server: ${STORAGE_IP}
    path: /volsync
    globalMounts:
      - path: /repository
  tmpfs:
    type: emptyDir
    advancedMounts:
      kopia:
        app:
          - path: /config/cache
            subPath: cache
          - path: /config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
