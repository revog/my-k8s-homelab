# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: infra-flux
spec:
  path: ./kubernetes/applications/infra/backup/volsync
  interval: 1h
  retryInterval: 1m
  timeout: 3m
  prune: true
  dependsOn:
    - name: longhorn
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: volsync
      namespace: infra-backup
  sourceRef:
    kind: GitRepository
    name: homelab
  targetNamespace: infra-backup
  decryption:
    provider: sops
    secretRef:
      name: sops-age
