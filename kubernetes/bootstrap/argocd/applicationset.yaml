apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/revog/my-k8s-homelab.git
        revision: main
        directories:
          - path: kubernetes/applications/*/*
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/source/targetRevision
        - /spec/syncPolicy
  template:
    metadata:
      name: '{{ .path.segments[2] }}-{{ .path.segments[3] }}'
      labels:
        category: '{{ .path.segments[2] }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/revog/my-k8s-homelab.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.segments[2] }}-{{ .path.segments[3] }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
