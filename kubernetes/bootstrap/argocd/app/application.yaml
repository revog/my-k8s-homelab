apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-root
  namespace: infra-argocd
spec:
  project: default
  source:
    repoURL: https://github.com/revog/my-k8s-homelab.git
    targetRevision: main
    path: kubernetes/applications/infra/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: infra-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
