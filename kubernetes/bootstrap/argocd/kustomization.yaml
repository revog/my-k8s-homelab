apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infra-argocd

helmCharts:
  - name: argo-cd
    releaseName: argocd
    repo: https://argoproj.github.io/argo-helm
    version: 6.7.18
    namespace: argocd
    valuesFile: values.yaml

resources:
  - app/root-application.yaml
