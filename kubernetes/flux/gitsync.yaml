apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab
  namespace: infra-flux
spec:
  interval: 1m
  url: https://github.com/revog/my-k8s-homelab
  ref:
    branch: main
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: infra-flux
spec:
  interval: 5m
  path: ./kubernetes/clusters/homelab
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
