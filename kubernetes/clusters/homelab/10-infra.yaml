---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: infra-flux
spec:
  interval: 10m
  path: ./kubernetes/application/infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: globals
