creation_rules:
  # AGE encrypted Kubernetes secret files
  - path_regex: kubernetes/.*/.*\.enc\.age\.ya?ml
    encrypted_regex: ^(data|stringData)$
    mac_only_encrypted: true
    age: 
  # AGE encrypted Talos configuration files
  - path_regex: talos/.*/.*\.enc\.age\.ya?ml
    encrypted_regex: '((?i)(pass|secret($|[^N])|ca|crt|key|token|^data$|^stringData$|inlineManifests))'
    mac_only_encrypted: true
    age: 

stores:
  yaml:
    indent: 2