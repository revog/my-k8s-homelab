machine:
  certSANs:
    - 192.168.100.50                               # VIP — add so TLS certs are valid via VIP
  features:
    rbac: true                                     # enable RBAC, always on
    stableHostname: true                           # consistent hostname based on machine ID
    diskQuotaSupport: true                         # per-pod disk quota enforcement
    kubePrism:
      enabled: true                                # local apiserver proxy on each node, reduces VIP dependency
      port: 7445                                   # local KubePrism proxy port
    hostDNS:
      enabled: true                                # DNS proxy on host, improves pod DNS reliability
#      forwardKubeDNSToHost: false                  # keep cluster and host DNS separate
      resolveMemberNames: true                     # nodes resolve each other by hostname
#  files:
#    - op: create
#      content: |
#      path: /etc/cri/conf.d/20-customization.part
#        [plugins."io.containerd.cri.v1.images"]
#          discard_unpacked_layers = false          # keep layers on disk, avoid re-unpack on restart
#        [plugins."io.containerd.cri.v1.runtime"]
#          device_ownership_from_security_context = true  # required for hardware device access (Hailo etc.)
  kubelet:
    defaultRuntimeSeccompProfileEnabled: true      # apply default seccomp profile to all pods
    disableManifestsDirectory: true                # disable static pod dir, not needed on Talos
    extraConfig:
      serializeImagePulls: false                   # pull images in parallel, faster pod startup
  network:
    nameservers:
      - 192.168.100.100
  sysctls:
    fs.inotify.max_user_instances: "8192"          # prevent "too many open files" for k8s controllers
    fs.inotify.max_user_watches: "1048576"         # max files watched, default 8192 is too low
    net.core.default_qdisc: fq                     # fair queue, pairs with BBR
    net.core.rmem_max: "67108864"                  # max socket receive buffer (64MB)
    net.core.wmem_max: "67108864"                  # max socket send buffer (64MB)
    net.ipv4.tcp_congestion_control: bbr           # better throughput/latency than default cubic
    net.ipv4.tcp_fastopen: "3"                     # send data in SYN, reduces latency (client+server)
    net.ipv4.tcp_mtu_probing: "1"                  # auto MTU discovery across different networks
    net.ipv4.tcp_rmem: 4096 87380 33554432         # tcp receive buffer min/default/max
    net.ipv4.tcp_wmem: 4096 65536 33554432         # tcp send buffer min/default/max
    net.ipv4.tcp_slow_start_after_idle: "0"        # keep full throughput on briefly idle connections
    net.ipv4.tcp_window_scaling: "1"               # required for buffers >64KB
  time:
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
      - 3.pool.ntp.org
